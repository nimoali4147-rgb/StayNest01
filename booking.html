<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Your Stay</title>
  <link rel="stylesheet" href="booking.html">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">

  <div class="max-w-2xl mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">
    <h1 class="text-4xl font-bold text-blue-950 text-center mb-8">
      Book Your Stay
    </h1>

    <form>
      <div class="mb-4">
        <label class="block font-semibold mb-2">Full Name</label>
        <input type="text"
               class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-900"
               placeholder="Enter your name">
      </div>

      <div class="mb-4">
        <label class="block font-semibold mb-2">Email</label>
        <input type="email"
               class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-900"
               placeholder="Enter your email">
      </div>

      <div class="mb-4">
        <label class="block font-semibold mb-2">Check-In Date</label>
        <input type="date"
               class="w-full border rounded-lg p-3">
      </div>

      <div class="mb-4">
        <label class="block font-semibold mb-2">Check-Out Date</label>
        <input type="date"
               class="w-full border rounded-lg p-3">
      </div>

      <div class="mb-6">
        <label class="block font-semibold mb-2">Room Type</label>
        <select class="w-full border rounded-lg p-3">
          <option>Luxury Room</option>
          <option>Guest Room</option>
          <option>Sea View Suite</option>
        </select>
      </div>

      <button
        class="w-full bg-blue-950 text-white py-3 rounded-lg font-bold hover:bg-yellow-500 hover:text-blue-950 transition">
        Confirm Booking
      </button>
    </form>
  </div>

</body>
</html>
