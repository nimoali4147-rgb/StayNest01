<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="login.html">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex justify-center items-center bg-gray-100>


    <div class="w-[450px] bg-white rounded-2xl shadow-xl p-8"></div>

    <!-- Register Card -->
    <div class="relative w-[570px] h-[800px] mb-30 bg-white border border-gray-800 rounded-2xl p-8 text-blue-900 shadow-2xl">

        <h1 class="text-5xl font-bold text-center mb-8">
            Register
        </h1>

        <form>

            <!-- Full Name -->
            <div class="mb-5">
                <label class="block text-xl font-semibold mb-2">
                    Full Name
                </label>

                <input
                    type="text"
                    placeholder="Enter Full Name"
                    class="w-full h-12 rounded-lg border border-gray-400  px-4 outline-none focus:ring-2 focus:ring-blue-400 placeholder:text-gray-300">
            </div>

            <!-- Email -->
            <div class="mb-5">
                <label class="block text-xl font-semibold mb-2">
                    Email Address
                </label>

                <input
                    type="email"
                    placeholder="john@gmail.com"
                    class="w-full h-12 rounded-lg border border-gray-400  px-4 outline-none focus:ring-2 focus:ring-blue-400 placeholder:text-gray-300">
            </div>

            <!-- Phone -->
            <div class="mb-5">
                <label class="block text-xl font-semibold mb-2">
                    Phone Number
                </label>

                <input
                    type="tel"
                    placeholder="+25471xxxxxxx"
                    class="w-full h-12 rounded-lg border border-gray-400 bg-transparent px-4 outline-none focus:ring-2 focus:ring-blue-400 placeholder:text-gray-300">
            </div>

            <!-- Password -->
            <div class="mb-5">
                <label class="block text-xl font-semibold mb-2">
                    Password
                </label>

                <input
                    type="password"
                    placeholder="Enter Password"
                    class="w-full h-12 rounded-lg border border-gray-400  px-4 outline-none focus:ring-2 focus:ring-blue-400 placeholder:text-gray-300">
            </div>

            <!-- Confirm Password -->
            <div class="mb-6">
                <label class="block text-xl font-semibold mb-2">
                    Confirm Password
                </label>

                <input
                    type="password"
                    placeholder="Confirm Password"
                    class="w-full h-12 rounded-lg border border-gray-400  px-4 outline-none focus:ring-2 focus:ring-blue-400 placeholder:text-gray-300">
            </div>

            <!-- Button -->
            <button
              <a href="login.html" class="w-full h-12 rounded-full bg-blue-950 text-white  text-2xl font-bold hover:bg-blue-900 hover:text-white duration-300">
                Register</a>
            </button>

            <!-- Login Link -->
            <p class="text-center mt-6 text-lg">
                Already have an account?
                <a href="login.html" class="text-blue-400 font-bold hover:underline">
                    Login
                </a>
            </p>

        </form>

    </div>


</body>
</html>
